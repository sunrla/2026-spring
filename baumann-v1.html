<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baumann Skin Type Prototype v1</title>
<style>
  :root {
    --bg: #FBFBFD;
    --text: #1D1D1F;
    --card-bg: #FFFFFF;
    --accent: #0071E3;
    --accent-soft: rgba(0, 113, 227, 0.06);
    --border: #D2D2D7;
    --muted: #86868B;
    --axis-color: #FF9500;
    --shadow: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
  }
  body.dark {
    --bg: #000000;
    --text: #F5F5F7;
    --card-bg: #1D1D1F;
    --accent: #2997FF;
    --accent-soft: rgba(41, 151, 255, 0.1);
    --border: #424245;
    --muted: #86868B;
    --shadow: 0 1px 3px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.2);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Apple SD Gothic Neo", "Pretendard", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background 0.2s ease, color 0.2s ease;
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 1.5rem 1.25rem 4rem;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
    gap: 1rem;
  }
  h1 {
    font-size: 1.75rem;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .theme-toggle {
    padding: 0.5rem 1rem;
    font-size: 0.82rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: border-color 0.15s ease, background 0.15s ease, color 0.2s ease;
    white-space: nowrap;
  }
  .theme-toggle:hover { border-color: var(--accent); }

  /* Sticky progress bar */
  .progress-sticky {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 0.75rem 0 1rem;
    margin-bottom: 1rem;
    z-index: 10;
    transition: background 0.2s ease;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .progress-axis {
    color: var(--axis-color);
    font-weight: 600;
    transition: color 0.15s ease;
  }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--axis-color);
    border-radius: 3px;
    transition: width 0.25s ease, background 0.15s ease;
  }

  /* Question card */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem 1.75rem;
    box-shadow: var(--shadow);
    transition: opacity 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }
  .card.fading { opacity: 0; }

  .q-meta {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 0.75rem;
    letter-spacing: 0.01em;
  }
  .q-text {
    font-size: 1.45rem;
    font-weight: 500;
    margin: 0 0 1.5rem;
    line-height: 1.4;
    letter-spacing: -0.01em;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .option-card {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.9rem 1.1rem;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .option-card:hover { border-color: var(--accent); }
  .option-card.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .option-num {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--axis-color);
    width: 1.5rem;
    flex-shrink: 0;
    transition: color 0.15s ease;
  }
  .option-label { font-size: 1rem; }
  .option-card.selected .option-label { font-weight: 500; }

  /* Nav */
  .nav {
    display: flex;
    justify-content: space-between;
    gap: 0.75rem;
    margin-top: 1.5rem;
  }
  .btn {
    padding: 0.7rem 1.4rem;
    font-size: 0.95rem;
    font-family: inherit;
    font-weight: 500;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease, opacity 0.15s ease;
  }
  .btn:hover:not(:disabled) { border-color: var(--accent); }
  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .btn-primary {
    background: var(--accent);
    color: #FFFFFF;
    border-color: var(--accent);
  }
  .btn-primary:hover:not(:disabled) { filter: brightness(0.92); }

  /* Result */
  .result {
    margin-top: 2rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .result.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .result-header {
    text-align: center;
    padding: 1.5rem 0 1rem;
  }
  .result-axes {
    font-size: 0.95rem;
    color: var(--muted);
    letter-spacing: 0.25em;
    margin: 0 0 0.3rem;
  }
  .result-code {
    font-size: 3.5rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin: 0;
  }

  .result-desc {
    padding: 1.4rem 1.5rem;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 1.5rem;
  }
  .result-desc-title {
    font-size: 1.05rem;
    font-weight: 600;
    margin: 0 0 0.6rem;
  }
  .result-desc-text {
    font-size: 1rem;
    line-height: 1.7;
    margin: 0;
  }

  .bars {
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
    margin-bottom: 1.5rem;
  }
  .bar-row { }
  .bar-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.88rem;
    margin-bottom: 0.35rem;
  }
  .bar-axis-name { font-weight: 500; }
  .bar-score {
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-size: 0.82rem;
  }
  .bar-track {
    height: 10px;
    background: var(--border);
    border-radius: 5px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.6s cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  .restart-row {
    display: flex;
    justify-content: center;
    margin-top: 1rem;
  }

  @media (max-width: 480px) {
    .app { padding: 1rem 0.9rem 3rem; }
    h1 { font-size: 1.4rem; }
    .card { padding: 1.5rem 1.25rem; }
    .q-text { font-size: 1.2rem; }
    .result-code { font-size: 2.75rem; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>피부 유형 진단 v1</h1>
    <button class="theme-toggle" id="themeToggle" type="button">다크 모드</button>
  </header>

  <div class="progress-sticky">
    <div class="progress-meta">
      <span class="progress-axis" id="progressAxis">유분/건조 — 1/10</span>
      <span id="progressTotal">전체 1/40</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:2.5%"></div>
    </div>
  </div>

  <section id="quizSection">
    <div class="card" id="questionCard">
      <div class="q-meta" id="qMeta">질문 1 · 유분/건조</div>
      <p class="q-text" id="qText"></p>
      <div class="options" id="options"></div>
    </div>
    <div class="nav">
      <button class="btn" id="prevBtn" type="button" disabled>이전</button>
      <button class="btn btn-primary" id="nextBtn" type="button" disabled>다음</button>
    </div>
  </section>

  <section class="result" id="resultSection" hidden>
    <div class="result-header">
      <div class="result-axes" id="resultAxes"></div>
      <div class="result-code" id="resultCode"></div>
    </div>
    <div class="result-desc">
      <h3 class="result-desc-title" id="resultTitle"></h3>
      <p class="result-desc-text" id="resultText"></p>
    </div>
    <div class="bars" id="resultBars"></div>
    <div class="restart-row">
      <button class="btn btn-primary" id="restartBtn" type="button">다시 하기</button>
    </div>
  </section>
</div>

    DRPW: 'DRPW — 건조하지만 자극에 강하고, 색소·주름 관리를 본격적으로 할 수 있는 타입. 상세 설명은 추후 정제 예정.',
    DRPT: 'DRPT — 건조하고 자극에 강하며, 색소침착은 있지만 주름 부담은 적은 타입. 상세 설명은 추후 정제 예정.',
    DRNW: 'DRNW — 건조·저항성에 주름이 동반되지만 색소는 옅은 편인 타입. 상세 설명은 추후 정제 예정.',

    CSPW: 'CSPW — 복합성·민감·색소·주름이 모두 존재해 부위별 저자극 케어가 필요한 타입. 상세 설명은 추후 정제 예정.',
    CSPT: 'CSPT — 복합성이며 민감·색소가 있으나 주름 부담은 적은 타입. 상세 설명은 추후 정제 예정.',
    CSNW: 'CSNW — 복합성이며 민감·주름이 있으나 색소는 옅은 편인 타입. 상세 설명은 추후 정제 예정.',
    CSNT: 'CSNT — 복합성·민감하지만 색소·주름 부담은 적은 타입. 상세 설명은 추후 정제 예정.',
    CRPW: 'CRPW — 복합성·저항성에 색소·주름이 동반되어, 관리 폭이 넓은 타입. 상세 설명은 추후 정제 예정.',
    CRPT: 'CRPT — 복합성·저항성이며 색소침착은 있으나 주름 부담은 적은 타입. 상세 설명은 추후 정제 예정.',
    CRNW: 'CRNW — 복합성·저항성에 주름이 있으나 색소는 옅은 편인 타입. 상세 설명은 추후 정제 예정.',
    CRNT: 'CRNT — 복합성·저항성에 색소·주름 부담이 모두 적어 유분 균형만 챙기면 되는 타입. 상세 설명은 추후 정제 예정.'
  };

  // 상태
  const answers = new Array(QUESTIONS.length).fill(null);
  let currentIdx = 0;

  // DOM 캐시
  const $ = id => document.getElementById(id);
  const themeToggle = $('themeToggle');
  const progressAxis = $('progressAxis');
  const progressTotal = $('progressTotal');
  const progressFill = $('progressFill');
  const questionCard = $('questionCard');
  const qMeta = $('qMeta');
  const qText = $('qText');
  const optionsEl = $('options');
  const prevBtn = $('prevBtn');
  const nextBtn = $('nextBtn');
  const quizSection = $('quizSection');
  const resultSection = $('resultSection');
  const resultAxes = $('resultAxes');
  const resultCode = $('resultCode');
  const resultBars = $('resultBars');
  const resultTitle = $('resultTitle');
  const resultText = $('resultText');
  const restartBtn = $('restartBtn');

  // --- Theme ---
  function setTheme(dark) {
    document.body.classList.toggle('dark', dark);
    themeToggle.textContent = dark ? '라이트 모드' : '다크 모드';
  }
  const mq = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
  setTheme(mq && mq.matches);
  themeToggle.addEventListener('click', () => {
    setTheme(!document.body.classList.contains('dark'));
  });

  // --- Render ---
  // 축별 로컬 인덱스 계산 (예: axis=1의 3번째 문항)
  function getAxisLocal(idx) {
    const axisIdx = QUESTIONS[idx].axis;
    let local = 0, total = 0;
    for (let i = 0; i < QUESTIONS.length; i++) {
      if (QUESTIONS[i].axis === axisIdx) {
        total++;
        if (i <= idx) local++;
      }
    }
    return { local, total };
  }

  function renderContent() {
    const q = QUESTIONS[currentIdx];
    const axis = AXES[q.axis];

    // 축 컬러 CSS 변수 업데이트 (프로그레스바·선택 번호 연동)
    document.documentElement.style.setProperty('--axis-color', axis.color);

    // 진행률
    const { local, total } = getAxisLocal(currentIdx);
    progressAxis.textContent = `${axis.name} — ${local}/${total}`;
    progressTotal.textContent = `전체 ${currentIdx + 1}/${QUESTIONS.length}`;
    const pct = ((currentIdx + 1) / QUESTIONS.length) * 100;
    progressFill.style.width = pct + '%';

    // 질문 카드
    qMeta.textContent = `질문 ${currentIdx + 1} · ${axis.name}`;
    qText.textContent = q.text;

    // 선택지 렌더
    optionsEl.innerHTML = '';
    SCALE.forEach(s => {
      const card = document.createElement('div');
      card.className = 'option-card' + (answers[currentIdx] === s.value ? ' selected' : '');
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.dataset.value = String(s.value);

      const num = document.createElement('span');
      num.className = 'option-num';
      num.textContent = String(s.value);

      const lbl = document.createElement('span');
      lbl.className = 'option-label';
      lbl.textContent = s.label;

      card.appendChild(num);
      card.appendChild(lbl);

      card.addEventListener('click', () => selectAnswer(s.value));
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          selectAnswer(s.value);
        }
      });
      optionsEl.appendChild(card);
    });

    updateNav();
  }

  function render(withFade) {
    if (withFade) {
      questionCard.classList.add('fading');
      setTimeout(() => {
        renderContent();
        requestAnimationFrame(() => {
          questionCard.classList.remove('fading');
        });
      }, 200);
    } else {
      renderContent();
    }
  }

  function selectAnswer(value) {
    answers[currentIdx] = value;
    Array.from(optionsEl.children).forEach(c => {
      c.classList.toggle('selected', Number(c.dataset.value) === value);
    });
    updateNav();
  }

  function updateNav() {
    prevBtn.disabled = currentIdx === 0;
    nextBtn.disabled = answers[currentIdx] === null;
    nextBtn.textContent = currentIdx === QUESTIONS.length - 1 ? '결과 보기' : '다음';
  }

  prevBtn.addEventListener('click', () => {
    if (currentIdx === 0) return;
    currentIdx--;
    render(true);
  });

  nextBtn.addEventListener('click', () => {
    if (answers[currentIdx] === null) return;
    if (currentIdx < QUESTIONS.length - 1) {
      currentIdx++;
      render(true);
    } else {
      showResult();
    }
  });

  // --- Result ---
  function calculate() {
    const scores = [0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => { scores[q.axis] += answers[i]; });
    const letters = scores.map((score, i) => {
      const ax = AXES[i];
      if (ax.kind === 'tri') {
        if (score <= ax.cutoffs.lowMax) return ax.letters.low;
        if (score <= ax.cutoffs.midMax) return ax.letters.mid;
        return ax.letters.high;
      }
      return score <= ax.cutoffs.lowMax ? ax.letters.low : ax.letters.high;
    });
    return { scores, code: letters.join('') };
  }

  function showResult() {
    const { scores, code } = calculate();
    const desc = TYPE_DESCRIPTIONS[code] || `${code} — 설명이 아직 준비되지 않았습니다.`;

    resultAxes.textContent = code.split('').join(' · ');
    resultCode.textContent = code;
    resultTitle.textContent = `당신의 타입: ${code}`;
    resultText.textContent = desc;

    // 막대그래프
    resultBars.innerHTML = '';
    AXES.forEach((ax, i) => {
      const score = scores[i];
      const pct = ((score - 10) / 40) * 100; // 10~50 → 0~100%

      const row = document.createElement('div');
      row.className = 'bar-row';

      const labelRow = document.createElement('div');
      labelRow.className = 'bar-label';

      const name = document.createElement('span');
      name.className = 'bar-axis-name';
      name.textContent = ax.name;
      name.style.color = ax.color;

      const scoreLbl = document.createElement('span');
      scoreLbl.className = 'bar-score';
      scoreLbl.textContent = `${score} / 50`;

      labelRow.appendChild(name);
      labelRow.appendChild(scoreLbl);

      const track = document.createElement('div');
      track.className = 'bar-track';
      const fill = document.createElement('div');
      fill.className = 'bar-fill';
      fill.style.background = ax.color;
      fill.style.width = '0%';
      track.appendChild(fill);

      row.appendChild(labelRow);
      row.appendChild(track);
      resultBars.appendChild(row);

      // 막대 애니메이션
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          fill.style.width = pct + '%';
        });
      });
    });

    quizSection.hidden = true;
    resultSection.hidden = false;
    requestAnimationFrame(() => {
      resultSection.classList.add('visible');
      resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  }

  restartBtn.addEventListener('click', () => {
    for (let i = 0; i < answers.length; i++) answers[i] = null;
    currentIdx = 0;
    resultSection.classList.remove('visible');
    resultSection.hidden = true;
    quizSection.hidden = false;
    render(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // 초기 렌더
  render(false);
})();
</script>
</body>
</html>
